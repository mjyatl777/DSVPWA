# ============================================================
# Fortify on Demand – SAST Pipeline for DSVPWA (Python)
# Container image : fortifydocker/fortify-ci-tools:latest
# FoD Release ID  : 1770630
# Source repo     : https://github.com/mjyatl777/DSVPWA
# ============================================================
#
# Required pipeline secrets (set in Azure DevOps → Library → Variable Groups
# or as pipeline secret variables):
#
#   FOD_CLIENT_ID       – FoD API client ID
#   FOD_CLIENT_SECRET   – FoD API client secret
#
# Required pipeline variables (non-secret):
#
#   FOD_API_URL         – e.g. https://api.ams.fortify.com  (or api.emea, etc.)
#
# ============================================================

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

variables:
  FOD_RELEASE_ID: '1770630'
  PACKAGE_FILE: '$(Build.ArtifactStagingDirectory)/dsvpwa-package.zip'

pool:
  vmImage: 'ubuntu-latest'

container:
  image: fortifydocker/fortify-ci-tools:latest
  # No --user root; the image runs as vsts_azpcontainer — we work with that

steps:

  # ── 1. Check out the target repository ──────────────────────────────────────
  - checkout: none

  - script: |
      git clone https://github.com/mjyatl777/DSVPWA "$(Build.SourcesDirectory)"
    displayName: 'Checkout DSVPWA source'

  # ── 2. Create venv, install deps, and package ───────────────────────────────
  #
  #  fortify-ci-tools (Ubuntu 24.04) ships Python 3 but NOT python3-venv.
  #  Instead of apt (which requires root), we use pip's built-in venv via
  #  the 'virtualenv' package installed into the user site, or simply use
  #  python3 -m venv with --without-pip and install pip manually.
  #
  #  Simplest root-free approach: install virtualenv via pip --user, then
  #  use it to create the venv.
  #
  - script: |
      set -e

      SOURCE_DIR="$(Build.SourcesDirectory)"
      VENV_DIR="$SOURCE_DIR/.venv"
      STAGING_DIR="$(Build.ArtifactStagingDirectory)"

      echo "==> Python version"
      python3 --version

      # ── Install virtualenv without root (pip --user) ──────────────────────
      echo "==> Installing virtualenv"
      pip3 install --user virtualenv

      # Ensure ~/.local/bin is on PATH so 'virtualenv' command is found
      export PATH="$HOME/.local/bin:$PATH"

      # ── Create the virtual environment ───────────────────────────────────
      echo "==> Creating venv at $VENV_DIR"
      python3 -m virtualenv "$VENV_DIR"
      source "$VENV_DIR/bin/activate"

      # ── Install project dependencies ──────────────────────────────────────
      cd "$SOURCE_DIR"
      if [ -f requirements.txt ]; then
        echo "==> Installing dependencies from requirements.txt"
        pip install --upgrade pip
        pip install -r requirements.txt
      else
        echo "==> No requirements.txt found – skipping pip install"
      fi

      # Confirm venv is intact before handing to scancentral
      echo "==> Venv python: $(which python)"
      ls "$VENV_DIR/bin/python"

      # ── Package with ScanCentral ──────────────────────────────────────────
      mkdir -p "$STAGING_DIR"

      echo "==> Running scancentral package"
      scancentral package \
        -bt none \
        --python-virtual-env "$VENV_DIR" \
        -o "$(PACKAGE_FILE)"

      echo "==> Package created:"
      ls -lh "$(PACKAGE_FILE)"
    displayName: 'Create venv, install deps, and package with ScanCentral'

  # ── 3. Log in to Fortify on Demand ──────────────────────────────────────────
  - script: |
      fcli fod session login \
        --url "$(FOD_API_URL)" \
        --client-id "$(FOD_CLIENT_ID)" \
        --client-secret "$(FOD_CLIENT_SECRET)" \
        --session pipeline
    displayName: 'Authenticate to Fortify on Demand'
    env:
      FOD_CLIENT_ID: $(FOD_CLIENT_ID)
      FOD_CLIENT_SECRET: $(FOD_CLIENT_SECRET)

  # ── 4. Upload package and start SAST scan ───────────────────────────────────
  - script: |
      fcli fod sast-scan start \
        --release "$(FOD_RELEASE_ID)" \
        --file "$(PACKAGE_FILE)" \
        --store curScan \
        --session pipeline
    displayName: 'Submit SAST scan to FoD (release $(FOD_RELEASE_ID))'

  # ── 5. Wait for scan completion ─────────────────────────────────────────────
  #  Remove or comment out this step if you do NOT want the pipeline to block
  #  until the FoD scan finishes.
  - script: |
      fcli fod sast-scan wait-for \
        ::curScan:: \
        --session pipeline
    displayName: 'Wait for SAST scan to complete'

  # ── 6. Log out ───────────────────────────────────────────────────────────────
  - script: |
      fcli fod session logout --session pipeline
    displayName: 'Log out of Fortify on Demand'
    condition: always()