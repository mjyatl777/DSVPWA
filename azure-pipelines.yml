# ============================================================
# Fortify on Demand – SAST Pipeline for DSVPWA (Python)
# Container image : fortifydocker/fortify-ci-tools:latest
# FoD Release ID  : 1770630
# Source repo     : https://github.com/mjyatl777/DSVPWA
# ============================================================
#
# Required pipeline secrets (set in Azure DevOps → Library → Variable Groups
# or as pipeline secret variables):
#
#   FOD_CLIENT_ID       – FoD API client ID
#   FOD_CLIENT_SECRET   – FoD API client secret
#
# Required pipeline variables (non-secret):
#
#   FOD_API_URL         – e.g. https://api.ams.fortify.com  (or api.emea, etc.)
#
# ============================================================

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

variables:
  FOD_RELEASE_ID: '1770630'
  PACKAGE_FILE: '$(Build.ArtifactStagingDirectory)/dsvpwa-package.zip'

pool:
  vmImage: 'ubuntu-latest'

container:
  image: fortifydocker/fortify-ci-tools:latest
  options: --user root

steps:

  # ── 1. Check out the target repository ──────────────────────────────────────
  - checkout: none

  - script: |
      git clone https://github.com/mjyatl777/DSVPWA "$(Build.SourcesDirectory)"
    displayName: 'Checkout DSVPWA source'

  # ── 2. Install Python, create venv, install deps, and package ───────────────
  #
  #  All done in ONE step so the venv path is a plain shell variable shared
  #  across the whole script — no ADO macro expansion issues across steps.
  #
  - script: |
      set -e

      # ── 2a. Install Python toolchain ──────────────────────────────────────
      apt-get update -qq
      apt-get install -y python3 python3-pip python3-venv --no-install-recommends

      # ── 2b. Create virtualenv (use a simple absolute path, not an ADO macro)
      VENV_DIR="$(Build.SourcesDirectory)/.venv"
      python3 -m venv "$VENV_DIR"
      source "$VENV_DIR/bin/activate"

      # ── 2c. Install project dependencies ─────────────────────────────────
      cd "$(Build.SourcesDirectory)"
      if [ -f requirements.txt ]; then
        pip install --upgrade pip
        pip install -r requirements.txt
        echo "Dependencies installed from requirements.txt"
      else
        echo "No requirements.txt found – skipping pip install"
      fi

      # Confirm venv exists before handing it to scancentral
      echo "Virtual environment path: $VENV_DIR"
      ls "$VENV_DIR/bin/python"

      # ── 2d. Package with ScanCentral ──────────────────────────────────────
      mkdir -p "$(Build.ArtifactStagingDirectory)"

      scancentral package \
        -bt none \
        --python-virtual-env "$VENV_DIR" \
        -o "$(PACKAGE_FILE)"

      echo "Package created: $(PACKAGE_FILE)"
      ls -lh "$(PACKAGE_FILE)"
    displayName: 'Install deps, create venv, and package with ScanCentral'

  # ── 3. Log in to Fortify on Demand ──────────────────────────────────────────
  - script: |
      fcli fod session login \
        --url "$(FOD_API_URL)" \
        --client-id "$(FOD_CLIENT_ID)" \
        --client-secret "$(FOD_CLIENT_SECRET)" \
        --session pipeline
    displayName: 'Authenticate to Fortify on Demand'
    env:
      FOD_CLIENT_ID: $(FOD_CLIENT_ID)
      FOD_CLIENT_SECRET: $(FOD_CLIENT_SECRET)

  # ── 4. Upload package and start SAST scan ───────────────────────────────────
  - script: |
      fcli fod sast-scan start \
        --release "$(FOD_RELEASE_ID)" \
        --file "$(PACKAGE_FILE)" \
        --store curScan \
        --session pipeline
    displayName: 'Submit SAST scan to FoD (release $(FOD_RELEASE_ID))'

  # ── 5. Wait for scan completion ─────────────────────────────────────────────
  #  Remove or comment out this step if you do NOT want the pipeline to block
  #  until the FoD scan finishes.
  - script: |
      fcli fod sast-scan wait-for \
        ::curScan:: \
        --session pipeline
    displayName: 'Wait for SAST scan to complete'

  # ── 6. Log out ───────────────────────────────────────────────────────────────
  - script: |
      fcli fod session logout --session pipeline
    displayName: 'Log out of Fortify on Demand'
    condition: always()