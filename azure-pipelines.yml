# ============================================================
# Fortify on Demand – SAST Pipeline for DSVPWA (Python)
# Agent        : ubuntu-latest (Microsoft-hosted)
# Fortify tools: installed at runtime via fcli (no container needed)
# FoD Release ID: 1770630
# Source repo  : https://github.com/mjyatl777/DSVPWA
# ============================================================
#
# Required pipeline SECRET variables:
#   FOD_CLIENT_ID       – FoD API client ID
#   FOD_CLIENT_SECRET   – FoD API client secret
#
# Required pipeline VARIABLES (non-secret):
#   FOD_API_URL         – e.g. https://api.ams.fortify.com
#
# ============================================================

trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - main
      - master

variables:
  FOD_RELEASE_ID: '1770630'
  SCANCENTRAL_VERSION: 'latest'
  VENV_DIR: '$(Build.SourcesDirectory)/.venv'
  PACKAGE_FILE: '$(Build.ArtifactStagingDirectory)/dsvpwa-package.zip'
  FOD_API_URL: 'https://api.ams.fortify.com'

pool:
  vmImage: 'ubuntu-latest'

steps:

  # ── 1. Check out the target repository ──────────────────────────────────────
  - checkout: none

  - script: |
      git clone https://github.com/mjyatl777/DSVPWA "$(Build.SourcesDirectory)"
    displayName: 'Checkout DSVPWA source'

  # ── 2. Install fcli and ScanCentral Client ───────────────────────────────────
  #  Uses the official fcli installer — no container or pre-installed tools needed.
  - script: |
      set -e
      echo "==> Installing fcli"
      curl -fsSL https://github.com/fortify/fcli/releases/latest/download/fcli-linux.tgz \
        | tar -xz -C /usr/local/bin
      fcli --version

      echo "==> Installing ScanCentral Client via fcli"
      fcli tool sc-client install --version $(SCANCENTRAL_VERSION) -d /opt/scancentral
      echo "/opt/scancentral/bin" >> $GITHUB_PATH || true
      export PATH="/opt/scancentral/bin:$PATH"
      scancentral -version
    displayName: 'Install fcli and ScanCentral Client'

  # ── 3. Set up Python venv and install project dependencies ──────────────────
  #  ubuntu-latest ships Python 3.12; python3-venv is pre-installed.
  - script: |
      set -e
      echo "==> Python version: $(python3 --version)"

      python3 -m venv "$(VENV_DIR)"
      source "$(VENV_DIR)/bin/activate"

      if [ -f "$(Build.SourcesDirectory)/requirements.txt" ]; then
        echo "==> Installing dependencies"
        pip install --upgrade pip
        pip install -r "$(Build.SourcesDirectory)/requirements.txt"
      else
        echo "==> No requirements.txt found – skipping"
      fi

      echo "==> Venv ready: $(which python)"
    displayName: 'Set up Python virtual environment'

  # ── 4. Package source with ScanCentral ──────────────────────────────────────
  - script: |
      set -e
      export PATH="/opt/scancentral/bin:$PATH"
      mkdir -p "$(Build.ArtifactStagingDirectory)"

      cd "$(Build.SourcesDirectory)"

      scancentral package \
        -bt none \
        --python-virtual-env "$(VENV_DIR)" \
        -o "$(PACKAGE_FILE)"

      echo "==> Package created:"
      ls -lh "$(PACKAGE_FILE)"
    displayName: 'Package source with ScanCentral'

  # ── 5. Log in to Fortify on Demand ──────────────────────────────────────────
  - script: |
      fcli fod session login \
        --url "$(FOD_API_URL)" \
        --client-id "$(FOD_CLIENT_ID)" \
        --client-secret "$(FOD_CLIENT_SECRET)" \
        --session pipeline
    displayName: 'Authenticate to Fortify on Demand'
    env:
      FOD_CLIENT_ID: $(FOD_CLIENT_ID)
      FOD_CLIENT_SECRET: $(FOD_CLIENT_SECRET)

  # ── 6. Upload package and start SAST scan ───────────────────────────────────
  - script: |
      fcli fod sast-scan start \
        --release "$(FOD_RELEASE_ID)" \
        --file "$(PACKAGE_FILE)" \
        --store curScan \
        --session pipeline
    displayName: 'Submit SAST scan to FoD (release $(FOD_RELEASE_ID))'

  # ── 7. Wait for scan completion ─────────────────────────────────────────────
  #  Comment out if you don't want the pipeline to block on scan completion.
  - script: |
      fcli fod sast-scan wait-for ::curScan:: --session pipeline
    displayName: 'Wait for SAST scan to complete'

  # ── 8. Log out ───────────────────────────────────────────────────────────────
  - script: |
      fcli fod session logout --session pipeline
    displayName: 'Log out of Fortify on Demand'
    condition: always()